<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>GanaderApp — Gestión de Finca</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3A2E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GanaderApp">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --verde: #1F3A2E;
  --verde-2: #2C5240;
  --verde-3: #3E6B54;
  --crema: #F3EFE4;
  --crema-2: #FFFDF8;
  --cuero: #6B4226;
  --cuero-2: #8B5E3C;
  --oro: #C99A3B;
  --oro-2: #E0BC6B;
  --rust: #A63D2F;
  --sage: #8B9B7E;
  --text: #2A241C;
  --text-mut: #6E6656;
  --border: #DDD4C0;
  --shadow: 0 2px 10px rgba(42,36,28,0.08);
  --shadow-lg: 0 12px 32px rgba(42,36,28,0.18);
  --radius: 10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--crema);
  color:var(--text);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--oro-2);}

/* ---------- Layout shell ---------- */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:236px;
  background:var(--verde);
  color:var(--crema-2);
  display:flex;
  flex-direction:column;
  padding:22px 14px;
  position:fixed;
  top:0;left:0;bottom:0;
  z-index:40;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:4px 8px 22px 8px;
  border-bottom:1px solid rgba(255,255,255,0.12);
  margin-bottom:16px;
}
.brand-mark{width:34px;height:34px;flex:none;}
.brand-text{line-height:1.05;}
.brand-text .t1{font-family:'Fraunces',serif;font-weight:700;font-size:17px;letter-spacing:0.2px;}
.brand-text .t2{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--oro-2);margin-top:2px;}

.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:8px;
  color:rgba(255,253,248,0.72);
  font-size:14px;font-weight:500;
  border:none;background:transparent;text-align:left;width:100%;
  transition:background .15s, color .15s;
}
.nav-item svg{width:18px;height:18px;flex:none;opacity:0.85;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
.nav-item.active{background:var(--oro);color:var(--verde);font-weight:600;}
.nav-item.active svg{opacity:1;}

.sidebar-foot{
  border-top:1px solid rgba(255,255,255,0.12);
  padding-top:12px;margin-top:12px;
  font-size:11.5px;color:rgba(255,253,248,0.5);
}
.finca-name{color:var(--oro-2);font-weight:600;font-size:13px;margin-bottom:3px;}

.main{
  margin-left:236px;
  flex:1;
  display:flex;flex-direction:column;
  min-height:100vh;
  width:calc(100% - 236px);
}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  background:var(--crema-2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:21px;margin:0;font-weight:600;}
.topbar .sub{font-size:12.5px;color:var(--text-mut);margin-top:2px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}

#content{padding:24px 28px 100px 28px;flex:1;}

.mobile-topbar{display:none;}
.bottom-nav{display:none;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:8px;border:1px solid transparent;
  font-size:13.5px;font-weight:600;
  background:var(--verde);color:#fff;
}
.btn:hover{background:var(--verde-2);}
.btn.ghost{background:transparent;color:var(--verde);border-color:var(--border);}
.btn.ghost:hover{background:rgba(31,58,46,0.06);}
.btn.gold{background:var(--oro);color:var(--verde);}
.btn.gold:hover{background:var(--oro-2);}
.btn.danger{background:transparent;color:var(--rust);border-color:rgba(166,61,47,0.35);}
.btn.danger:hover{background:rgba(166,61,47,0.08);}
.btn.sm{padding:6px 11px;font-size:12.5px;}
.icon-btn{
  width:32px;height:32px;border-radius:7px;border:1px solid var(--border);
  background:var(--crema-2);display:inline-flex;align-items:center;justify-content:center;
  color:var(--text-mut);
}
.icon-btn:hover{color:var(--rust);border-color:var(--rust);}
.btn:disabled,.icon-btn:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.btn:disabled:hover,.icon-btn:disabled:hover{background:inherit;color:inherit;border-color:inherit;}
.icon-btn.edit:hover{color:var(--verde);border-color:var(--verde);}
.icon-btn svg{width:15px;height:15px;}

/* Dentro de celdas de tabla, los íconos van planos (sin caja propia) para integrarse
   con la fila; solo muestran su fondo/borde al pasar el mouse o si están activos. */
.actions-cell{display:flex;gap:4px;align-items:center;}
.actions-cell .icon-btn{
  border-color:transparent;background:transparent;width:30px;height:30px;
}
.actions-cell .icon-btn:hover{background:rgba(166,61,47,0.08);border-color:transparent;}
.actions-cell .icon-btn.edit:hover{background:rgba(31,58,46,0.08);border-color:transparent;}
.actions-cell .icon-btn:disabled{opacity:0.3;background:transparent;}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi-card{
  background:var(--crema-2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--stripe,var(--oro));
}
.kpi-label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-mut);font-weight:600;}
.kpi-value{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-top:6px;}
.kpi-note{font-size:12px;color:var(--text-mut);margin-top:4px;}
.kpi-note.up{color:var(--verde-3);}
.kpi-note.down{color:var(--rust);}

.section-row{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:1100px){.section-row{grid-template-columns:1fr;}}

.card{
  background:var(--crema-2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;
}
.card h3{font-size:15px;margin:0 0 14px 0;display:flex;align-items:center;justify-content:space-between;font-weight:600;}
.card h3 .tag{font-size:10.5px;background:var(--crema);color:var(--text-mut);padding:2px 8px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

.alert-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;}
.alert-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border-radius:8px;background:rgba(166,61,47,0.06);
  border:1px solid rgba(166,61,47,0.15);font-size:13px;
}
.alert-item.warn{background:rgba(201,154,59,0.1);border-color:rgba(201,154,59,0.28);}
.alert-item .dot{width:7px;height:7px;border-radius:50%;background:var(--rust);flex:none;}
.alert-item.warn .dot{background:var(--oro);}
.alert-item b{font-weight:600;}
.empty-note{color:var(--text-mut);font-size:13px;padding:10px 0;}

/* ---------- Toolbar / filters ---------- */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:16px;flex-wrap:wrap;
}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
input[type=text],input[type=number],input[type=date],select,textarea{
  font-family:'Inter',sans-serif;
  padding:8px 11px;border:1px solid var(--border);border-radius:7px;
  background:#fff;font-size:13.5px;color:var(--text);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--oro-2);outline-offset:0;border-color:var(--oro);}
.search-box{position:relative;}
.search-box input{padding-left:32px;width:220px;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-mut);}

/* ---------- Table ---------- */
.table-wrap{background:var(--crema-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{
  text-align:left;padding:11px 14px;background:var(--crema);
  font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-mut);
  font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:rgba(201,154,59,0.06);}
tbody tr.clickable{cursor:pointer;}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.pill.green{background:rgba(62,107,84,0.14);color:var(--verde-3);}
.pill.gold{background:rgba(201,154,59,0.18);color:#8a6a1f;}
.pill.rust{background:rgba(166,61,47,0.14);color:var(--rust);}
.pill.grey{background:rgba(110,102,86,0.14);color:var(--text-mut);}
.num-pos{color:var(--verde-3);font-weight:600;}
.num-neg{color:var(--rust);font-weight:600;}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(31,25,17,0.5);
  display:flex;align-items:center;justify-content:center;z-index:100;
  padding:20px;opacity:0;animation:fadeIn .15s forwards;
}
@keyframes fadeIn{to{opacity:1;}}
.modal{
  background:var(--crema-2);border-radius:14px;max-width:560px;width:100%;
  max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);
  border:1px solid var(--border);
}
.modal.wide{max-width:760px;}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--crema-2);z-index:2;
}
.modal-head h3{margin:0;font-size:17px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-mut);line-height:1;padding:4px;}
.modal-close:hover{color:var(--rust);}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--crema-2);}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.one-col{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:600;color:var(--text-mut);}
.field label .req{color:var(--rust);}
.field select,.field input,.field textarea{width:100%;}
.field textarea{resize:vertical;min-height:64px;}

.subsection{margin-top:20px;padding-top:16px;border-top:1px dashed var(--border);}
.subsection-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.subsection-head h4{margin:0;font-size:13px;font-weight:700;color:var(--cuero);text-transform:uppercase;letter-spacing:.5px;}
.mini-list{display:flex;flex-direction:column;gap:6px;}
.mini-row{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 10px;background:var(--crema);border-radius:7px;font-size:12.5px;
}
.mini-row .mr-main{flex:1;}
.mini-row .mr-sub{color:var(--text-mut);font-size:11.5px;}

.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--verde);color:#fff;padding:11px 16px;border-radius:8px;
  font-size:13px;box-shadow:var(--shadow-lg);animation:slideUp .2s;max-width:320px;
}
.toast.danger{background:var(--rust);}
@keyframes slideUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-mut);
}
.empty-state svg{width:46px;height:46px;margin-bottom:14px;opacity:.5;}
.empty-state p{font-size:14px;margin:0 0 14px 0;}

.stamp{
  display:inline-flex;align-items:center;gap:6px;
  border:1.5px dashed var(--cuero-2);color:var(--cuero);
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
}

/* ---------- Detail modal specifics ---------- */
.detail-header-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px;}
.dh-item{background:var(--crema);border-radius:8px;padding:10px 12px;}
.dh-item .dl{font-size:10.5px;text-transform:uppercase;color:var(--text-mut);font-weight:700;letter-spacing:.4px;}
.dh-item .dv{font-size:15px;font-weight:600;margin-top:3px;font-family:'JetBrains Mono',monospace;}

.progress-bar{height:8px;background:var(--crema);border-radius:6px;overflow:hidden;}
.progress-bar > div{height:100%;background:var(--oro);}

/* ---------- Login screen ---------- */
#loginScreen{
  position:fixed;inset:0;background:var(--verde);
  display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;
}
#loginScreen.hidden{display:none;}
.login-card{
  background:var(--crema-2);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;
  box-shadow:var(--shadow-lg);
}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;}
.login-brand .t1{font-family:'Fraunces',serif;font-weight:700;font-size:22px;color:var(--verde);}
.login-brand .t2{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--cuero);}
.login-card .field{margin-bottom:14px;}
.login-card label{font-size:12px;font-weight:600;color:var(--text-mut);display:block;margin-bottom:5px;}
.login-card input{width:100%;padding:10px 12px;}
.login-error{
  background:rgba(166,61,47,0.1);border:1px solid rgba(166,61,47,0.3);color:var(--rust);
  font-size:12.5px;padding:9px 11px;border-radius:7px;margin-bottom:14px;display:none;
}
.login-error.show{display:block;}
.login-status{text-align:center;color:var(--text-mut);font-size:12.5px;margin-top:14px;}
#loginSubmitBtn{width:100%;justify-content:center;padding:11px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,253,248,0.55);}
.sync-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--sage);}
.sync-badge.offline .dot{background:var(--rust);}
.logout-link{color:var(--oro-2);cursor:pointer;text-decoration:underline;font-size:11px;}

@media(max-width:900px){
  .sidebar{display:none;}
  .main{margin-left:0;width:100%;}
  .mobile-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;background:var(--verde);color:#fff;position:sticky;top:0;z-index:30;
  }
  .mobile-topbar .brand{border:none;padding:0;margin:0;}
  .topbar{padding:14px 16px;}
  .topbar h1{font-size:18px;}
  #content{padding:16px 14px 90px 14px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .detail-header-grid{grid-template-columns:1fr 1fr;}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--verde);z-index:40;
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    justify-content:space-around;box-shadow:0 -4px 14px rgba(0,0,0,0.15);
    overflow-x:auto;
  }
  .bn-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:rgba(255,255,255,0.6);font-size:9.5px;
    padding:6px 8px;border-radius:8px;flex:none;min-width:58px;font-weight:600;
  }
  .bn-item svg{width:19px;height:19px;}
  .bn-item.active{color:var(--oro-2);}
  .toolbar{flex-direction:column;align-items:stretch;}
  .search-box input{width:100%;}
  .table-wrap{overflow-x:auto;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#C99A3B" stroke-width="1.5"/>
        <path d="M12 16c0-3 2-5 4-5s3 2 3 4-1 3-1 5 1 4 1 4M28 16c0-3-2-5-4-5s-3 2-3 4 1 3 1 5-1 4-1 4" stroke="#C99A3B" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M17 30h6" stroke="#C99A3B" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="t1">GanaderApp</div>
      <div class="t2">Acceso a la finca</div>
    </div>
    <div class="login-error" id="loginError"></div>
    <form id="loginForm">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn gold" id="loginSubmitBtn">Iniciar sesión</button>
    </form>
    <div class="login-status" id="loginStatus">Conectando con la base de datos en la nube...</div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#E0BC6B" stroke-width="1.5"/>
        <path d="M12 16c0-3 2-5 4-5s3 2 3 4-1 3-1 5 1 4 1 4M28 16c0-3-2-5-4-5s-3 2-3 4 1 3 1 5-1 4-1 4" stroke="#E0BC6B" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M17 30h6" stroke="#E0BC6B" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <div class="t1">GanaderApp</div>
        <div class="t2">Gestión de finca</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div class="finca-name" id="sidebarFincaName">Mi Finca</div>
      <div style="font-size:11px;color:rgba(255,253,248,0.6);margin-bottom:6px;" id="sidebarRole">Rol: —</div>
      <div class="sync-badge" id="syncBadge"><span class="dot"></span><span id="syncBadgeText">Sincronizado en la nube</span></div>
      <div style="margin-top:8px;"><span class="logout-link" id="btnLogout">Cerrar sesión</span></div>
    </div>
  </aside>

  <div class="main">
    <div class="mobile-topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none" width="26" height="26">
          <circle cx="20" cy="20" r="19" stroke="#E0BC6B" stroke-width="1.5"/>
          <path d="M12 16c0-3 2-5 4-5s3 2 3 4-1 3-1 5 1 4 1 4M28 16c0-3-2-5-4-5s-3 2-3 4 1 3 1 5-1 4-1 4" stroke="#E0BC6B" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M17 30h6" stroke="#E0BC6B" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <div class="brand-text"><div class="t1" style="color:#fff;font-size:15px;">GanaderApp</div></div>
      </div>
    </div>

    <div class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="sub" id="pageSub">Resumen general de la finca</div>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>

    <div id="content"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div id="modalRoot"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
/* =========================================================
   GanaderApp — motor de datos + UI
   Almacenamiento: Firebase Firestore (nube) con caché local en
   memoria + persistencia offline (IndexedDB) para trabajar sin señal.
   ========================================================= */

const moneyShort = n => {
  n = Number(n)||0;
  if(Math.abs(n) >= 1000000) return (n/1000000).toFixed(1)+'M';
  if(Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'k';
  return n.toFixed(0);
};
const fmtDate = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-VE',{day:'2-digit',month:'short',year:'numeric'}); };
const ageFromDate = d => {
  if(!d) return '—';
  const born = new Date(d+'T00:00:00'); const now = new Date();
  let months = (now.getFullYear()-born.getFullYear())*12 + (now.getMonth()-born.getMonth());
  if(months < 0) months = 0;
  if(months < 12) return months + ' m';
  const y = Math.floor(months/12), m = months%12;
  return y + 'a ' + m + 'm';
};

/* ---------- API síncrona que usa el resto de la app (sin cambios en la UI) ---------- */
function getAll(entity){ return CACHE[entity] || []; }
function getById(entity, id){ return getAll(entity).find(x => x.id === id); }
function getFinca(){ return CACHE.finca; }

function upsertItem(entity, obj){
  const arr = getAll(entity);
  const i = arr.findIndex(x => x.id === obj.id);
  if(i >= 0) arr[i] = obj; else arr.push(obj);
  setDoc(doc(colRef(entity), obj.id), obj).catch(err => {
    console.error(err); toast('No se pudo guardar en la nube (se reintentará al recuperar conexión)', true);
  });
  return obj;
}
function removeItem(entity, id){
  CACHE[entity] = getAll(entity).filter(x => x.id !== id);
  deleteDoc(doc(colRef(entity), id)).catch(err => {
    console.error(err); toast('No se pudo eliminar en la nube (se reintentará al recuperar conexión)', true);
  });
}
function saveFinca(f){
  CACHE.finca = f;
  setDoc(fincaDocRef(), f).catch(err => { console.error(err); toast('No se pudo guardar en la nube', true); });
}
// Reemplaza por completo una colección (usado por Configuración → Importar respaldo)
async function replaceCollectionFS(entity, arr){
  const existing = getAll(entity);
  const batch = writeBatch(db);
  existing.forEach(o => batch.delete(doc(colRef(entity), o.id)));
  arr.forEach(o => { if(!o.id) o.id = uid(); batch.set(doc(colRef(entity), o.id), o); });
  await batch.commit();
}
// Escribe varios documentos nuevos de una vez (usado por los datos de ejemplo)
async function seedCollectionFS(entity, arr){
  const batch = writeBatch(db);
  arr.forEach(o => batch.set(doc(colRef(entity), o.id), o));
  await batch.commit();
}

async function ensureUserRole(user){
  const uRef = usuarioDocRef(user.uid);

  }

  const allSnap = await getDocs(usuariosColRef());

  await setDoc(uRef, data);
  STATE.role = rol;

  if(STATE.role !== 'admin') return;
  unsubscribers.push(onSnapshot(usuariosColRef(), snap => {

function startRealtimeSync(onFirstLoad){
  unsubscribers.forEach(u => u());
  unsubscribers = [];
  let pending = ENTITIES.length + 1;
  let fired = false;
  const tick = () => { pending = Math.max(0, pending-1); if(pending===0 && !fired){ fired = true; onFirstLoad(); } };

  unsubscribers.push(onSnapshot(fincaDocRef(), snap => {
    if(snap.exists()) CACHE.finca = snap.data();
    tick();
    refreshIfIdle();
  }, err => { console.error(err); setSyncStatus(false); }));

  ENTITIES.forEach(entity => {
    unsubscribers.push(onSnapshot(colRef(entity), snap => {
      CACHE[entity] = snap.docs.map(d => d.data());
      tick();
      refreshIfIdle();
    }, err => { console.error(err); setSyncStatus(false); }));
  });
}
function refreshIfIdle(){
  setSyncStatus(true);
  const modalOpen = document.getElementById('modalRoot').innerHTML.trim() !== '';
  if(!modalOpen && STATE.ready && ROUTES[STATE.page]) ROUTES[STATE.page]();
}
function setSyncStatus(ok){
  const badge = document.getElementById('syncBadge');
  const text = document.getElementById('syncBadgeText');
  if(!badge) return;
  badge.classList.toggle('offline', !ok);
  text.textContent = ok ? 'Sincronizado en la nube' : 'Sin conexión — reintentando';
}
window.addEventListener('online', () => setSyncStatus(true));
window.addEventListener('offline', () => setSyncStatus(false));

function toast(msg, danger){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (danger ? ' danger' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

/* =========================================================
   Generic form builder
   ========================================================= */
function buildFieldHTML(f, val){
  val = (val===undefined || val===null) ? '' : val;
  const reqMark = f.required ? '<span class="req"> *</span>' : '';
  let input = '';
  if(f.type === 'select'){
    input = `<select name="${f.key}" ${f.required?'required':''}>` +
      (f.placeholder ? `<option value="">${f.placeholder}</option>` : '') +
      f.options.map(o => `<option value="${o.value}" ${String(o.value)===String(val)?'selected':''}>${o.label}</option>`).join('') +
      `</select>`;
  } else if(f.type === 'textarea'){
    input = `<textarea name="${f.key}" ${f.required?'required':''}>${val}</textarea>`;
  } else {
    input = `<input type="${f.type}" name="${f.key}" value="${val}" ${f.required?'required':''} ${f.step?`step="${f.step}"`:''} placeholder="${f.placeholder||''}">`;
  }
  return `<div class="field ${f.full?'full':''}"><label>${f.label}${reqMark}</label>${input}</div>`;
}

        <div class="modal-head"><h3>${title}</h3><button class="modal-close" id="formClose">&times;</button></div>
        <form id="dynForm">
          <div class="modal-body">
            <div class="form-grid">
              ${fields.map(f => buildFieldHTML(f, values[f.key])).join('')}
            </div>
            ${extraBodyHTML || ''}
          </div>
          <div class="modal-foot">
            <button type="button" class="btn ghost" id="formCancel">Cancelar</button>
            <button type="submit" class="btn gold">Guardar</button>
          </div>
        </form>
      </div>
    </div>`;
  const close = () => root.innerHTML = '';
  document.getElementById('formClose').onclick = close;
  document.getElementById('formCancel').onclick = close;
  document.getElementById('formBackdrop').onclick = (e) => { if(e.target.id==='formBackdrop') close(); };
  if(afterRenderHook) afterRenderHook(document.getElementById('dynForm'));
  document.getElementById('dynForm').onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const obj = {};
    fields.forEach(f => obj[f.key] = fd.get(f.key));
    onSubmit(obj, close);
  };
}

function centroCostoLabel(tipo, id){
  if(tipo === 'general' || !tipo) return 'Finca (general)';
  if(tipo === 'lote') return (getById('lotes', id)||{}).nombre || '—';
  if(tipo === 'activo') return (getById('activos_otros', id)||{}).nombre_referencia || '—';
  if(tipo === 'proyecto') return (getById('proyectos', id)||{}).nombre || '—';

}

ROUTES.dashboard = function(){

  const animalesActivos = semovientes.filter(s => s.estado === 'activo');
  const valorHato = animalesActivos.reduce((a,s)=> a + (Number(s.valor_actual)||0), 0);

  const now = new Date();
  const monthKey = now.toISOString().slice(0,7);
  const movMes = movimientos.filter(m => (m.fecha||'').slice(0,7) === monthKey);
  const ingresosMes = movMes.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+(Number(m.monto)||0),0);
  const egresosMes = movMes.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+(Number(m.monto)||0),0);
  const flujoMes = ingresosMes - egresosMes;

  const stockBajo = insumos.filter(i => Number(i.stock_actual) <= Number(i.stock_minimo));
  const mantVencidos = [];
  activos.forEach(a => (a.mantenimientos||[]).forEach(m => {
    if(m.estado !== 'realizado' && m.fecha_programada && m.fecha_programada < todayISO()) mantVencidos.push({activo:a, m});
    else if(m.estado === 'pendiente' && m.fecha_programada) {
      const days = (new Date(m.fecha_programada) - now) / 86400000;
      if(days >= 0 && days <= 7) mantVencidos.push({activo:a, m, soon:true});
    }
  }));

  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.toISOString().slice(0,7));
  }
  const monthly = months.map(mk => {
    const ms = movimientos.filter(m => (m.fecha||'').slice(0,7)===mk);
    return {
      mk,
      ingreso: ms.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+(Number(m.monto)||0),0),
      egreso: ms.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+(Number(m.monto)||0),0),
    };
  });
  const maxVal = Math.max(1, ...monthly.map(m=>Math.max(m.ingreso,m.egreso)));

  const catMap = {};
  movMes.filter(m=>m.tipo==='egreso').forEach(m => { catMap[m.categoria] = (catMap[m.categoria]||0) + Number(m.monto||0); });
  const catArr = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catMax = Math.max(1, ...catArr.map(c=>c[1]));

  content().innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card" style="--stripe:var(--verde-3)">
        <div class="kpi-label">Animales activos</div>
        <div class="kpi-value">${animalesActivos.length}</div>
        <div class="kpi-note">de ${semovientes.length} registrados en total</div>
      </div>
      <div class="kpi-card" style="--stripe:var(--oro)">
        <div class="kpi-label">Valor del hato</div>
        <div class="kpi-value">${moneyShort(valorHato)}</div>
        <div class="kpi-note">valoración actual</div>
      </div>
      <div class="kpi-card" style="--stripe:${flujoMes>=0?'var(--verde-3)':'var(--rust)'}">
        <div class="kpi-label">Flujo de caja (mes)</div>
        <div class="kpi-value ${flujoMes>=0?'num-pos':'num-neg'}">${flujoMes>=0?'+':''}${moneyShort(flujoMes)}</div>
        <div class="kpi-note">ingresos ${moneyShort(ingresosMes)} · egresos ${moneyShort(egresosMes)}</div>
      </div>
      <div class="kpi-card" style="--stripe:var(--cuero-2)">
        <div class="kpi-label">Alertas activas</div>
        <div class="kpi-value">${stockBajo.length + mantVencidos.length}</div>
        <div class="kpi-note">stock bajo + mantenimiento</div>
      </div>
    </div>

    <div class="section-row">
      <div class="card">
        <h3>Flujo de caja — últimos 6 meses <span class="tag">Bs</span></h3>
        <div style="display:flex;align-items:flex-end;gap:14px;height:180px;padding:6px 4px;">
          ${monthly.map(m => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
              <div style="display:flex;gap:3px;align-items:flex-end;height:150px;">
                <div title="Ingresos ${money(m.ingreso)}" style="width:12px;border-radius:3px 3px 0 0;background:var(--verde-3);height:${Math.max(3,(m.ingreso/maxVal)*150)}px;"></div>
                <div title="Egresos ${money(m.egreso)}" style="width:12px;border-radius:3px 3px 0 0;background:var(--rust);opacity:.75;height:${Math.max(3,(m.egreso/maxVal)*150)}px;"></div>
              </div>
              <div style="font-size:10.5px;color:var(--text-mut);text-transform:capitalize;">${new Date(m.mk+'-02').toLocaleDateString('es-VE',{month:'short'})}</div>
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:16px;font-size:11.5px;color:var(--text-mut);margin-top:4px;">
          <span><span style="display:inline-block;width:9px;height:9px;background:var(--verde-3);border-radius:2px;margin-right:5px;"></span>Ingresos</span>
          <span><span style="display:inline-block;width:9px;height:9px;background:var(--rust);opacity:.75;border-radius:2px;margin-right:5px;"></span>Egresos</span>
        </div>
      </div>

      <div class="card">
        <h3>Egresos del mes por categoría</h3>
        ${catArr.length ? `<div style="display:flex;flex-direction:column;gap:10px;">
          ${catArr.map(([cat,val]) => `
            <div>
              <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
                <span>${cat || 'Sin categoría'}</span><span class="mono">${money(val)}</span>
              </div>
              <div class="progress-bar"><div style="width:${(val/catMax)*100}%;"></div></div>
            </div>`).join('')}
        </div>` : `<p class="empty-note">Aún no hay egresos registrados este mes.</p>`}
      </div>
    </div>

    <div class="section-row">
      <div class="card">
        <h3>Alertas <span class="tag">${stockBajo.length + mantVencidos.length}</span></h3>
        <div class="alert-list">
          ${stockBajo.map(i => `<div class="alert-item"><span class="dot"></span>Stock bajo: <b>${i.nombre}</b> — ${i.stock_actual} ${i.unidad_medida} (mínimo ${i.stock_minimo})</div>`).join('')}
          ${mantVencidos.map(x => `<div class="alert-item ${x.soon?'warn':''}"><span class="dot"></span>${x.soon?'Mantenimiento próximo':'Mantenimiento vencido'}: <b>${x.activo.nombre_referencia}</b> — ${fmtDate(x.m.fecha_programada)}</div>`).join('')}
          ${(stockBajo.length + mantVencidos.length)===0 ? `<p class="empty-note">Todo en orden — sin alertas pendientes.</p>` : ''}
        </div>
      </div>
      <div class="card">
        <h3>Finca <span class="tag">${potreros.length} potreros</span></h3>
        <div class="detail-header-grid" style="grid-template-columns:1fr 1fr;">
          <div class="dh-item"><div class="dl">Hectáreas totales</div><div class="dv">${getFinca().hectareas_totales || 0} ha</div></div>
          <div class="dh-item"><div class="dl">Proyectos en curso</div><div class="dv">${proyectos.filter(p=>p.estado==='en curso').length}</div></div>
          <div class="dh-item"><div class="dl">Lotes activos</div><div class="dv">${getAll('lotes').filter(l=>l.estado==='activo').length}</div></div>
          <div class="dh-item"><div class="dl">Ítems en bodega</div><div class="dv">${insumos.length}</div></div>
        </div>
      </div>
    </div>
  `;
};

  content().querySelectorAll('[data-del]').forEach(b => b.onclick = () => {

      removeItem('semovientes', b.dataset.del); toast('Animal eliminado'); renderSemoventesPage();
    });
  });
}

function pillCategoria(cat){
  const map = {cria:'gold', levante:'green', ceba:'rust', reproductor:'grey', 'ordeño':'green'};
  const label = (SEMOVIENTE_CATEGORIAS.find(c=>c.value===cat)||{}).label || cat || '—';
  return `<span class="pill ${map[cat]||'grey'}">${label}</span>`;
}
function pillEstadoSemoviente(e){
  if(e==='activo') return `<span class="pill green">Activo</span>`;
  if(e==='vendido') return `<span class="pill gold">Vendido</span>`;
  return `<span class="pill rust">De baja</span>`;
}
function emptyState(icon, title, sub){
  return `<div class="empty-state">${ICONS[icon]||''}<p><b>${title}</b><br>${sub}</p></div>`;
}

                  <button class="icon-btn" data-delh="${h.id}" ${canEdit('semovientes')?'':'disabled title="Tu rol no permite editar"'}>${ICONS.trash}</button>

  const close = () => root.innerHTML = '';

    upsertItem('semovientes', s); close(); openSemovienteDetail(id);

function openHistorialForm(semoviente, closeParent){
  openFormModal({
    title: 'Agregar evento sanitario/reproductivo',
    fields: [
      {key:'tipo_evento', label:'Tipo de evento', type:'select', required:true, options:HISTORIAL_TIPOS},
      {key:'fecha', label:'Fecha', type:'date', required:true},
      {key:'costo', label:'Costo (opcional)', type:'number', step:'0.01'},
      {key:'detalle', label:'Detalle', type:'textarea', full:true},
    ],
    values: {fecha: todayISO()},
    onSubmit: (obj, close) => {
      obj.id = uid();
      semoviente.historial = semoviente.historial || [];
      semoviente.historial.push(obj);
      upsertItem('semovientes', semoviente);
      toast('Evento agregado');
      close();
      if(closeParent) closeParent();
      openSemovienteDetail(semoviente.id);
    }
  });

function centroCostoOptionsFor(tipo){

let finanzasFilter = {tipo:'', mes:''};

ROUTES.finanzas = function(){

function renderFinanzasPage(){
  const all = getAll('movimientos').sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const filtered = all.filter(m => {
    if(finanzasFilter.tipo && m.tipo !== finanzasFilter.tipo) return false;
    if(finanzasFilter.mes && (m.fecha||'').slice(0,7) !== finanzasFilter.mes) return false;
    return true;
  });
  const totalIng = filtered.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+(Number(m.monto)||0),0);
  const totalEgr = filtered.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+(Number(m.monto)||0),0);

  content().innerHTML = `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px;">
      <div class="kpi-card" style="--stripe:var(--verde-3)"><div class="kpi-label">Ingresos (filtro actual)</div><div class="kpi-value num-pos">${moneyShort(totalIng)}</div></div>
      <div class="kpi-card" style="--stripe:var(--rust)"><div class="kpi-label">Egresos (filtro actual)</div><div class="kpi-value num-neg">${moneyShort(totalEgr)}</div></div>
      <div class="kpi-card" style="--stripe:var(--oro)"><div class="kpi-label">Balance</div><div class="kpi-value ${(totalIng-totalEgr)>=0?'num-pos':'num-neg'}">${moneyShort(totalIng-totalEgr)}</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <select id="finTipo">
          <option value="">Todos los tipos</option>
          <option value="ingreso" ${finanzasFilter.tipo==='ingreso'?'selected':''}>Ingresos</option>
          <option value="egreso" ${finanzasFilter.tipo==='egreso'?'selected':''}>Egresos</option>
        </select>
        <input type="month" id="finMes" value="${finanzasFilter.mes}">
        ${finanzasFilter.mes ? `<button class="btn ghost sm" id="finClearMes">Limpiar mes</button>` : ''}
      </div>
      <div class="stamp">${filtered.length} movimientos</div>
    </div>
    <div class="table-wrap">
      ${filtered.length===0 ? emptyState('cash','Sin movimientos registrados','Registra tu primer ingreso o egreso.') : `
      <table>
        <thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Centro de costo</th><th>Proveedor/Cliente</th><th>Monto</th><th></th></tr></thead>
        <tbody>
          ${filtered.map(m => `
            <tr>
              <td>${fmtDate(m.fecha)}</td>
              <td><span class="pill ${m.tipo==='ingreso'?'green':'rust'}">${m.tipo}</span></td>
              <td>${m.categoria}${m.subcategoria?' · '+m.subcategoria:''}</td>
              <td>${centroCostoLabel(m.centro_costo_tipo, m.centro_costo_id)}</td>
              <td>${m.proveedor_cliente||'—'}</td>
              <td class="mono ${m.tipo==='ingreso'?'num-pos':'num-neg'}">${m.tipo==='ingreso'?'+':'-'}${money(m.monto)}</td>
              ${actionsCellHTML('finanzas', m.id)}
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
  document.getElementById('finTipo').onchange = e => { finanzasFilter.tipo = e.target.value; renderFinanzasPage(); };
  document.getElementById('finMes').onchange = e => { finanzasFilter.mes = e.target.value; renderFinanzasPage(); };
  const clearBtn = document.getElementById('finClearMes');
  if(clearBtn) clearBtn.onclick = () => { finanzasFilter.mes=''; renderFinanzasPage(); };
  content().querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openMovimientoForm(getById('movimientos', b.dataset.edit)));
  content().querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
    confirmDelete('Esta acción no se puede deshacer.', () => {
      removeItem('movimientos', b.dataset.del); toast('Movimiento eliminado'); renderFinanzasPage();
    });
  });
}

function openMovimientoForm(existing){
  const ccTipo = (existing && existing.centro_costo_tipo) || 'general';
  openFormModal({
    title: existing ? 'Editar movimiento' : 'Nuevo movimiento',
    wide:true,
    fields: movimientoFieldsBase(),
    values: existing || {fecha: todayISO(), tipo:'egreso', metodo_pago:'efectivo'},
    extraBodyHTML: `
      <div class="subsection">
        <h4>Centro de costo</h4>
        <div class="form-grid">
          <div class="field"><label>Imputar a</label>
            <select name="centro_costo_tipo" id="ccTipoSel">
              <option value="general" ${ccTipo==='general'?'selected':''}>Finca (general)</option>
              <option value="lote" ${ccTipo==='lote'?'selected':''}>Lote</option>
              <option value="activo" ${ccTipo==='activo'?'selected':''}>Activo (maquinaria/infra.)</option>
              <option value="proyecto" ${ccTipo==='proyecto'?'selected':''}>Proyecto</option>
            </select>
          </div>
          <div class="field" id="ccIdWrap">
            <label>Referencia</label>
            <select name="centro_costo_id" id="ccIdSel"></select>
          </div>
        </div>
      </div>`,
    afterRenderHook: (form) => {
      const sel = form.querySelector('#ccTipoSel');
      const idSel = form.querySelector('#ccIdSel');
      const populate = (tipo, selected) => {
        const opts = centroCostoOptionsFor(tipo);
        idSel.innerHTML = tipo==='general' ? `<option value="">—</option>` : opts.map(o=>`<option value="${o.value}" ${o.value===selected?'selected':''}>${o.label}</option>`).join('');
        idSel.disabled = tipo==='general';
      };
      populate(ccTipo, existing ? existing.centro_costo_id : '');
      sel.onchange = () => populate(sel.value, '');
    },
    onSubmit: (obj, close) => {
      obj.id = existing ? existing.id : uid();
      upsertItem('movimientos', obj);
      toast(existing ? 'Movimiento actualizado' : 'Movimiento registrado');
      close(); renderFinanzasPage();
    }
  });
}

function insumoFields(){
  return [
    {key:'nombre', label:'Nombre', type:'text', required:true, full:true},
    {key:'unidad_medida', label:'Unidad de medida', type:'select', required:true, options:[
      {value:'kg',label:'kg'},{value:'litros',label:'litros'},{value:'dosis',label:'dosis'},{value:'unidad',label:'unidad'}]},
    {key:'stock_actual', label:'Stock actual', type:'number', step:'0.01', required:true},
    {key:'stock_minimo', label:'Stock mínimo (alerta)', type:'number', step:'0.01', required:true},

ROUTES.insumos = function(){
  topbarActions().innerHTML = newButtonHTML('insumos','btnNewInsumo','Nuevo insumo');
  const btn = document.getElementById('btnNewInsumo');
  if(btn) btn.onclick = () => openInsumoForm();
  renderInsumosPage();
};
function renderInsumosPage(){
  const insumos = getAll('insumos');
  const edit = canEdit('insumos'), del = canDelete();
  content().innerHTML = `
    <div class="toolbar"><div></div><div class="stamp">${insumos.filter(i=>Number(i.stock_actual)<=Number(i.stock_minimo)).length} en alerta de stock</div></div>
    <div class="table-wrap">
      ${insumos.length===0 ? emptyState('box','Bodega vacía','Registra alimento, sanidad o suplementos para llevar el stock.') : `
      <table>
        <thead><tr><th>Insumo</th><th>Unidad</th><th>Stock actual</th><th>Stock mínimo</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          ${insumos.map(i => {
            const bajo = Number(i.stock_actual) <= Number(i.stock_minimo);
            return `<tr>
              <td><b>${i.nombre}</b></td>
              <td>${i.unidad_medida}</td>
              <td class="mono">${i.stock_actual}</td>
              <td class="mono">${i.stock_minimo}</td>
              <td>${bajo?'<span class="pill rust">Stock bajo</span>':'<span class="pill green">OK</span>'}</td>
              <td class="actions-cell">
                <button class="btn sm ghost" data-in="${i.id}" ${edit?'':'disabled title="Tu rol no permite editar stock"'}>+ Entrada</button>
                <button class="btn sm ghost" data-out="${i.id}" ${edit?'':'disabled title="Tu rol no permite editar stock"'}>- Salida</button>
                <button class="icon-btn edit" data-edit="${i.id}" ${edit?'':'disabled title="Tu rol no permite editar"'}>${ICONS.edit}</button>
                <button class="icon-btn" data-del="${i.id}" ${del?'':'disabled title="Solo un administrador puede eliminar"'}>${ICONS.trash}</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>`;
  content().querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openInsumoForm(getById('insumos', b.dataset.edit)));
  content().querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
    confirmDelete('Se eliminará el ítem de la bodega.', () => { removeItem('insumos', b.dataset.del); toast('Insumo eliminado'); renderInsumosPage(); });
  });
  content().querySelectorAll('[data-in]').forEach(b => b.onclick = () => adjustStock(b.dataset.in, 1));
  content().querySelectorAll('[data-out]').forEach(b => b.onclick = () => adjustStock(b.dataset.out, -1));
}
function adjustStock(id, sign){
  const i = getById('insumos', id);
  const cantStr = prompt(`Cantidad a ${sign>0?'agregar':'retirar'} (${i.unidad_medida}):`, '');
  if(cantStr === null) return;
  const cant = Number(cantStr);
  if(isNaN(cant) || cant <= 0){ toast('Cantidad inválida', true); return; }
  i.stock_actual = Math.max(0, (Number(i.stock_actual)||0) + sign*cant);
  upsertItem('insumos', i);
  toast('Stock actualizado');
  renderInsumosPage();
}
function openInsumoForm(existing){
  openFormModal({
    title: existing ? 'Editar insumo' : 'Nuevo insumo',
    fields: insumoFields(),
    values: existing || {unidad_medida:'kg', stock_actual:0, stock_minimo:0},
    onSubmit: (obj, close) => {
      obj.id = existing ? existing.id : uid();
      upsertItem('insumos', obj);
      toast(existing ? 'Insumo actualizado' : 'Insumo creado');
      close(); renderInsumosPage();
    }
  });
}

function proximoMantenimiento(a){
  const pend = (a.mantenimientos||[]).filter(m=>m.estado!=='realizado' && m.fecha_programada).sort((x,y)=>x.fecha_programada.localeCompare(y.fecha_programada));
  return pend[0];
}
function renderActivosPage(){
  const activos = getAll('activos_otros');
  content().innerHTML = `
    <div class="toolbar"><div></div><div class="stamp">${activos.length} activos</div></div>

      <table>
        <thead><tr><th>Tipo</th><th>Nombre / referencia</th><th>Adquisición</th><th>Valor</th><th>Próx. mantenimiento</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          ${activos.map(a => {
            const prox = proximoMantenimiento(a);
            const vencido = prox && prox.fecha_programada < todayISO();
            return `<tr class="clickable" data-view="${a.id}">
              <td><span class="pill grey">${a.tipo}</span></td>
              <td><b>${a.nombre_referencia}</b></td>
              <td>${fmtDate(a.fecha_adquisicion)}</td>
              <td class="mono">${money(a.valor_adquisicion)}</td>
              <td>${prox ? `<span class="pill ${vencido?'rust':'gold'}">${fmtDate(prox.fecha_programada)}</span>` : '—'}</td>

              ${actionsCellHTML('activos', a.id)}
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>`;
  content().querySelectorAll('[data-view]').forEach(tr => tr.onclick = () => openActivoOtroDetail(tr.dataset.view));

function renderProyectosPage(){
  const proyectos = getAll('proyectos');
  const inversiones = getAll('inversiones');
  content().innerHTML = `
    <div class="toolbar-left" style="margin-bottom:16px;display:flex;gap:8px;">

    </div>
    <div id="proyContent"></div>
  `;
  document.getElementById('tabProy').onclick = () => { proyTab='proyectos'; renderProyectosPage(); };
  document.getElementById('tabInv').onclick = () => { proyTab='inversiones'; renderProyectosPage(); };

  const wrap = document.getElementById('proyContent');
  if(proyTab === 'proyectos'){
    wrap.innerHTML = proyectos.length===0 ? emptyState('invest','Sin proyectos','Crea un proyecto para darle seguimiento a una inversión.') : `
      <div class="table-wrap"><table>
        <thead><tr><th>Proyecto</th><th>Inversión</th><th>Avance</th><th>Gasto real</th><th>Estado</th><th></th></tr></thead>
        <tbody>
        ${proyectos.map(p => {
          const inv = getById('inversiones', p.inversion_id);
          const gasto = getAll('movimientos').filter(m=>m.centro_costo_tipo==='proyecto' && m.centro_costo_id===p.id && m.tipo==='egreso').reduce((a,m)=>a+(Number(m.monto)||0),0);

          return `<tr class="clickable" data-view="${p.id}">
            <td><b>${p.nombre}</b></td>
            <td>${inv?inv.nombre:'—'}</td>
            <td style="min-width:120px;"><div class="progress-bar"><div style="width:${p.avance_pct||0}%;"></div></div><div class="mono" style="font-size:11px;margin-top:3px;">${p.avance_pct||0}%</div></td>
            <td class="mono">${money(gasto)}</td>
            <td><span class="pill ${estMap[p.estado]||'grey'}">${p.estado}</span></td>
            ${actionsCellHTML('proyectos', p.id)}
          </tr>`;
        }).join('')}
        </tbody></table></div>`;
    wrap.querySelectorAll('[data-view]').forEach(tr => tr.onclick = () => openProyectoDetail(tr.dataset.view));

      confirmDelete('Se eliminará el proyecto, sus tareas y bitácora.', () => { removeItem('proyectos', b.dataset.del); toast('Proyecto eliminado'); renderProyectosPage(); });
    });
  } else {
    wrap.innerHTML = inversiones.length===0 ? emptyState('invest','Sin inversiones registradas','Registra presupuestos por ciclo productivo.') : `
      <div class="table-wrap"><table>
        <thead><tr><th>Nombre</th><th>Presupuesto</th><th>Fuente</th><th>ROI esperado</th><th>Inicio</th><th></th></tr></thead>
        <tbody>
        ${inversiones.map(i => `<tr>
          <td><b>${i.nombre}</b></td>
          <td class="mono">${money(i.monto_presupuestado)}</td>
          <td>${i.fuente_financiamiento||'—'}</td>
          <td class="mono">${i.roi_esperado?i.roi_esperado+'%':'—'}</td>
          <td>${fmtDate(i.fecha_inicio)}</td>
          ${actionsCellHTML('proyectos', i.id)}
        </tr>`).join('')}
        </tbody></table></div>`;
    wrap.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openInversionForm(getById('inversiones', b.dataset.edit)));
    wrap.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      confirmDelete('Los proyectos asociados quedarán sin inversión.', () => { removeItem('inversiones', b.dataset.del); toast('Inversión eliminada'); renderProyectosPage(); });
    });
  }
}

        <h4 style="margin-bottom:8px;">Diagnóstico</h4>
        <p style="font-size:12px;color:var(--text-mut);margin:0 0 8px 0;">Si no ves a alguien que ya inició sesión, usa este botón para consultar Firestore directamente (sin caché) y ver el resultado exacto.</p>
        <button class="btn ghost sm" id="btnDiagUsuarios">Verificar conexión con la lista de usuarios</button>
        <pre id="diagOut" style="margin-top:10px;font-size:11.5px;background:var(--crema);padding:10px 12px;border-radius:7px;white-space:pre-wrap;display:none;"></pre>
      </div>
      <div class="subsection">
        <h4 style="margin-bottom:8px;">Qué puede hacer cada rol</h4>
        <div class="mini-list">
          ${Object.entries(ROLES).map(([key,r]) => `<div class="mini-row"><div class="mr-main"><b>${r.label}</b><div class="mr-sub">${r.desc}</div></div></div>`).join('')}
        </div>
      </div>
    </div>` : ''}
  `;
  if(isAdmin){
    document.getElementById('fincaForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const obj = {id:FINCA_ID, nombre:fd.get('nombre'), ubicacion:fd.get('ubicacion'), hectareas_totales:fd.get('hectareas_totales')};
      saveFinca(obj);
      toast('Datos de la finca guardados');
      document.getElementById('sidebarFincaName').textContent = obj.nombre;
    };
    document.getElementById('btnExport').onclick = () => {
      const backup = {finca:getFinca()};
      entities.filter(e=>e!=='finca').forEach(e => backup[e] = getAll(e));
      const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `ganaderapp_backup_${todayISO()}.json`;
      a.click();
      toast('Respaldo exportado');
    };
    document.getElementById('btnImport').onclick = () => document.getElementById('fileImport').click();
    document.getElementById('fileImport').onchange = (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = JSON.parse(reader.result);
          toast('Importando respaldo, un momento...');
          if(data.finca) saveFinca(data.finca);
          for(const en of ENTITIES){
            if(Array.isArray(data[en])) await replaceCollectionFS(en, data[en]);
          }
          toast('Respaldo importado correctamente');
          goTo('dashboard');
        } catch(err){ console.error(err); toast('Archivo inválido o error al importar', true); }
      };
      reader.readAsText(file);
    };
    content().querySelectorAll('[data-role-uid]').forEach(sel => {
      sel.onchange = () => {
        setUserRole(sel.dataset.roleUid, sel.value);
        toast('Rol actualizado');
      };
    });
    document.getElementById('btnDiagUsuarios').onclick = async () => {
      const out = document.getElementById('diagOut');
      out.style.display = 'block';
      out.textContent = 'Consultando Firestore directamente (sin caché)...';
      try {
        const snap = await getDocs(usuariosColRef());
        if(snap.empty){
          out.textContent = 'La consulta funcionó correctamente, pero Firestore devolvió 0 documentos en la colección "usuarios". Esto es raro si ya viste el documento del encargado en la consola — puede indicar que la app está apuntando a un proyecto de Firebase distinto al que estás viendo en la consola.';
        } else {
          const lineas = snap.docs.map(d => `• ${d.id} → email: ${d.data().email || '—'}, rol: ${d.data().rol || '—'}`);
          out.textContent = `Se encontraron ${snap.size} documento(s) en Firestore ahora mismo:\n` + lineas.join('\n') + `\n\nSi aquí SÍ aparece el usuario pero no en la lista de arriba, recarga la página completa (F5) para forzar una reconexión.`;
        }
      } catch(err){
        console.error(err);
        out.textContent = `Error al consultar: ${err.code || ''} ${err.message || err}`;
      }
    };
  }
  const doLogout = () => signOut(auth);
  document.getElementById('btnLogoutConfig').onclick = doLogout;
};

/* =========================================================
   Datos de ejemplo (solo la primera vez)
   ========================================================= */
/* =========================================================
   AUTENTICACIÓN Y ARRANQUE
   ========================================================= */
const loginScreen = document.getElementById('loginScreen');
const appRoot = document.getElementById('app');
const bottomNavRoot = document.getElementById('bottomNav');
const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const loginStatus = document.getElementById('loginStatus');
const loginSubmitBtn = document.getElementById('loginSubmitBtn');

function showLoginError(msg){ loginError.textContent = msg; loginError.classList.add('show'); }
function hideLoginError(){ loginError.classList.remove('show'); }

loginForm.onsubmit = async (e) => {
  e.preventDefault();
  hideLoginError();
  loginSubmitBtn.disabled = true;
  loginSubmitBtn.textContent = 'Ingresando...';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged se encarga del resto
  } catch (err) {
    const map = {
      'auth/invalid-credential': 'Correo o contraseña incorrectos.',
      'auth/invalid-email': 'El correo no es válido.',
      'auth/too-many-requests': 'Demasiados intentos. Espera un momento e inténtalo de nuevo.',
      'auth/network-request-failed': 'Sin conexión a internet. Verifica tu red.',
    };
    showLoginError(map[err.code] || 'No se pudo iniciar sesión. Verifica tus datos.');
  } finally {
    loginSubmitBtn.disabled = false;
    loginSubmitBtn.textContent = 'Iniciar sesión';
  }
};

let appStarted = false;
async function startApp(user){
  if(appStarted) return;
  appStarted = true;
  loginStatus.textContent = 'Verificando tu acceso...';
  try {
    await ensureUserRole(user);
  } catch(err){
    console.error(err);
    loginStatus.textContent = 'No se pudo verificar tu rol de acceso.';
    appStarted = false;
    return;
  }
  loginStatus.textContent = 'Cargando datos de la finca...';
  try {
    await ensureFincaAndSeed();
  } catch(err){
    console.error(err);
  }
  // Importante: startRealtimeSync cancela y reinicia la lista de suscripciones activas,
  // así que se llama primero; los listeners de usuarios/rol se agregan después para que no
  // queden cancelados accidentalmente apenas se crean.
  startRealtimeSync(() => {
    loginScreen.classList.add('hidden');
    appRoot.style.display = '';
    STATE.ready = true;
    renderNav();
    goTo('dashboard');
  });
  subscribeUsuariosIfAdmin();
  // Escucha cambios en tu propio rol (por si un admin te lo cambia mientras estás dentro)
  unsubscribers.push(onSnapshot(usuarioDocRef(user.uid), snap => {
    if(snap.exists()){
      const nuevoRol = snap.data().rol;
      if(nuevoRol !== STATE.role){ STATE.role = nuevoRol; refreshIfIdle(); renderNav(); }
    }
  }));
}

onAuthStateChanged(auth, (user) => {
  if(user){
    startApp(user);
  } else {
    appStarted = false;
    STATE.ready = false;
    STATE.role = null;
    unsubscribers.forEach(u => u());
    unsubscribers = [];
    appRoot.style.display = 'none';
    loginScreen.classList.remove('hidden');
    loginStatus.textContent = '';
  }
});

const logoutHandler = () => signOut(auth);
document.getElementById('btnLogout').onclick = logoutHandler;
</script>

      navigator.serviceWorker.register('sw.js').catch(err => console.error('SW error:', err));
    });
  }
</script>
